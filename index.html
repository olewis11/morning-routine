<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Rhinebeck 500</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --asphalt: #2c3e50;
      --bg-color: #ecf0f1;
      --median-bg: #5C4033; /* Textured dirt brown */
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none; /* Prevents accidental highlighting */
      -webkit-user-select: none;
    }

    header {
      text-align: center;
      color: white;
      padding: 10px;
      background: #000000; /* Darker header makes the logo pop */
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex: 0 0 auto;
    }

    /* 3D Block Text Logo */
    h1 { 
      margin: 0; 
      font-size: 3rem; 
      font-weight: 900; 
      text-transform: uppercase; 
      letter-spacing: 2px;
      color: #FFD13B; /* Bright racing yellow */
      text-shadow: 4px 4px 0px #E83D33; /* Hard 3D red block shadow */
    }

    /* Big Countdown Overlay */
    #countdown-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 500;
    }
    #countdown-text {
      font-size: 15rem;
      font-weight: 900;
      color: #f1c40f;
      text-shadow: 0 10px 20px rgba(0,0,0,0.5);
      animation: pop 1s infinite;
    }
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0; }
    }

    .scroll-wrapper {
      flex: 1; 
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      flex-direction: column;
    }

    .track-container {
      flex: 1;
      display: grid;
      grid-template-rows: 1fr 15px 1fr 15px 1fr; 
      min-width: 1100px; 
      position: relative;
    }

    .lane {
      position: relative;
      background: var(--asphalt);
      display: flex;
      align-items: center;
      cursor: pointer;
      border-top: 3px solid #111;
      border-bottom: 3px solid #111;
    }

    .lane::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 4px;
      background: repeating-linear-gradient(90deg, #fff, #fff 40px, transparent 40px, transparent 80px);
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }

    /* General text styling before justification applied */
    .lane-label {
      position: absolute;
      left: 15px;
      color: rgba(255,255,255,0.4);
      font-weight: 700;
      font-size: 1.5rem;
      pointer-events: none;
      letter-spacing: 3px;
      z-index: 10;
    }

    .lane-timer {
      position: absolute;
      right: 15px;
      color: #f1c40f;
      font-size: 1.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
      z-index: 10;
      pointer-events: none;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .split-time {
      position: absolute;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      z-index: 10;
      pointer-events: none;
    }

    /* Justification Rules */
    #finn-lane .lane-label, 
    #finn-lane .lane-timer, 
    #finn-lane .split-time {
      top: 75%; /* Finn's text sits low in his lane */
    }

    #bowen-lane .lane-label, 
    #bowen-lane .lane-timer, 
    #bowen-lane .split-time {
      bottom: 10px; /* Bowen's text sits low in his lane */
    }

    .tire-track {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 12px;
      background: repeating-linear-gradient(90deg, #111, #111 8px, transparent 8px, transparent 16px);
      z-index: 15;
      transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      width: 0;
      opacity: 0.6;
      pointer-events: none;
    }

    .guardrail {
      background: repeating-linear-gradient(
        45deg,
        #c0392b,
        #c0392b 20px,
        #ecf0f1 20px,
        #ecf0f1 40px
      );
      box-shadow: inset 0 3px 5px rgba(0,0,0,0.5), 0 5px 10px rgba(0,0,0,0.5);
      z-index: 10;
    }

    .median {
      background: var(--median-bg);
      display: grid;
      grid-template-columns: repeat(12, 1fr); 
      align-items: center;
      color: white;
    }

    .task-box {
      text-align: center;
      padding: 5px;
      font-size: 1rem; 
      font-weight: 700;
      border-right: 2px dashed rgba(255,255,255,0.2);
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1.2;
    }
    .task-box:last-child { border-right: none; }
    
    .task-emoji {
      font-size: 2.5rem; 
      margin: 4px 0;
    }

    /* Start Button embedded directly in the track */
    .start-box {
      background: #27ae60;
      color: white;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: inset -5px 0 15px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: background 0.1s;
    }
    .start-box:active {
      background: #1e8449;
    }

    /* Pure Checkered Square */
    .finish-box {
      background-color: #fff;
      background-image: 
        linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111),
        linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111);
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
      border-right: none;
    }

    /* CAR AND ANIMATION LAYERS */
    .car {
      position: absolute;
      font-size: 5.5rem; 
      transform: translate(-50%, -50%) scaleX(-1);
      /* Now smoothly animates both Left (forward) and Top (into the median) */
      transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1), top 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      user-select: none;
      z-index: 20;
      white-space: nowrap; 
      -webkit-transform-style: preserve-3d;
      will-change: transform; /* Repaint fix for ghosting smudge */
    }

    /* **POLISH**: Center both cars in their asphalt lanes vertically */
    #finn-car { top: 50%; }
    #bowen-car { top: 50%; }

    .bouncer {
      display: inline-block;
      position: relative; /* Anchors the trophy */
    }

    .vehicle {
      display: inline-block;
      filter: drop-shadow(-4px 4px 5px rgba(0,0,0,0.5));
      -webkit-filter: drop-shadow(-4px 4px 5px rgba(0,0,0,0.5));
    }

    /* Paint Bowen's vehicle blue WITHOUT painting the trophy */
    #bowen-car .vehicle {
      filter: drop-shadow(-4px 4px 5px rgba(0,0,0,0.5)) hue-rotate(220deg);
      -webkit-filter: drop-shadow(-4px 4px 5px rgba(0,0,0,0.5)) hue-rotate(220deg);
    }

    /* The Trophy element: Hidden by default, correctly un-flipped */
    .trophy {
      display: none;
      position: absolute;
      left: 50%;
      font-size: 3.5rem;
      z-index: 30;
      transform: translateX(-50%) scaleX(-1); 
    }

    /* Reveal the trophy when they win */
    .is-winner .trophy {
      display: block;
    }

    /* Finn's trophy bounces ABOVE the car */
    #finn-car .trophy {
      bottom: 85%;
      animation: bounceTrophyFinn 0.5s infinite alternate ease-in-out;
    }

    /* Bowen's trophy bounces BELOW the car */
    #bowen-car .trophy {
      top: 85%;
      animation: bounceTrophyBowen 0.5s infinite alternate ease-in-out;
    }

    @keyframes bounceTrophyFinn {
      0% { transform: translateX(-50%) scaleX(-1) translateY(0); }
      100% { transform: translateX(-50%) scaleX(-1) translateY(-25px); }
    }

    @keyframes bounceTrophyBowen {
      0% { transform: translateX(-50%) scaleX(-1) translateY(0); }
      100% { transform: translateX(-50%) scaleX(-1) translateY(25px); }
    }

    /* **POLISH**: New class to snap the winning car to default forward facing orientation */
    .finish-orientation {
        transform: translate(-50%, -50%) !important; /* Removes scaleX(-1) */
    }

    /* Grandstand Area */
    .grandstand {
      flex: 0 0 50vh;
      width: 100%;
      background-color: #34495e;
      background-image: url('grandstand.jpg'); 
      background-size: cover;
      background-position: center bottom;
      border-top: 5px solid #222;
      box-shadow: inset 0 15px 20px rgba(0,0,0,0.4);
    }

    /* Controls Bottom Right */
    .controls {
      position: absolute;
      bottom: 15px;
      right: 15px;
      z-index: 100;
    }

    .reset-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 8px 15px;
      font-family: 'Outfit', sans-serif;
      font-weight: bold;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      font-size: 0.9rem;
    }
    .reset-btn:hover { background: #c0392b; }

    /* **POLISH**: Mobile Style Section for responsive design */
    @media (max-width: 1024px) {
        .grandstand {
            display: none !important; /* Hide grandstand on mobile screens */
        }
        
        /* **POLISH**: Shrink and compact the title for mobile dashboard */
        h1 {
            font-size: 2rem;
            margin: 5px 0;
            line-height: 1;
            white-space: nowrap; /* Single line */
        }
    }

  </style>
</head>
<body>

  <header>
    <h1>The Rhinebeck 500</h1>
  </header>

  <div id="countdown-overlay">
    <div id="countdown-text">3</div>
  </div>

  <div class="scroll-wrapper">
    <div class="track-container">
      
      <div class="lane" id="finn-lane">
        <div class="lane-label">FINN</div>
        <div class="lane-timer" id="finn-timer">0.0s</div>
        <div class="tire-track" id="finn-track"></div>
        <div class="car" id="finn-car">
          <div class="bouncer">
            <span class="vehicle">🏎️</span>
            <span class="trophy">🏆</span>
          </div>
        </div>
      </div>
      
      <div class="guardrail"></div>
      
      <div class="median">
        <div class="task-box start-box" id="start-btn">START<br>ENGINES</div>
        <div class="task-box">1<div class="task-emoji">👕</div>Get Dressed</div>
        <div class="task-box">2<div class="task-emoji">🪮</div>Brush Hair</div>
        <div class="task-box">3<div class="task-emoji">💊</div>Meds / Vitamins</div>
        <div class="task-box">4<div class="task-emoji">🥣</div>Get Breakfast</div>
        <div class="task-box">5<div class="task-emoji">🥞</div>Eat</div>
        <div class="task-box">6<div class="task-emoji">🍽️</div>Dishes in Sink</div>
        <div class="task-box">7<div class="task-emoji">🪥</div>Brush Teeth</div>
        <div class="task-box">8<div class="task-emoji">🧴</div>Sunscreen</div>
        <div class="task-box">9<div class="task-emoji">👟</div>Shoes On</div>
        <div class="task-box">10<div class="task-emoji">🎒</div>Pack Bag</div>
        <div class="task-box finish-box"></div>
      </div>
      
      <div class="guardrail"></div>
      
      <div class="lane" id="bowen-lane">
        <div class="lane-label">BOWEN</div>
        <div class="lane-timer" id="bowen-timer">0.0s</div>
        <div class="tire-track" id="bowen-track"></div>
        <div class="car" id="bowen-car">
          <div class="bouncer">
            <span class="vehicle">🏎️</span>
            <span class="trophy">🏆</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="grandstand"></div>

  <div class="controls">
    <button class="reset-btn" id="reset-btn">Reset Board</button>
  </div>

  <script>
    let finnStep = 0;
    let bowenStep = 0;
    const totalSteps = 11; 
    
    let firstPlaceAnnounced = false; 
    let isRacing = false;
    let audioCtx = null;
    
    // Timer Variables
    let raceStartTime = 0;
    let timerInterval = null;
    let finnFinished = false;
    let bowenFinished = false;

    const finnCar = document.getElementById('finn-car');
    const bowenCar = document.getElementById('bowen-car');
    const finnTrack = document.getElementById('finn-track');
    const bowenTrack = document.getElementById('bowen-track');
    const finnLane = document.getElementById('finn-lane');
    const bowenLane = document.getElementById('bowen-lane');
    const finnTimerEl = document.getElementById('finn-timer');
    const bowenTimerEl = document.getElementById('bowen-timer');
    
    const startBtn = document.getElementById('start-btn');
    const resetBtn = document.getElementById('reset-btn');
    const countdownOverlay = document.getElementById('countdown-overlay');
    const countdownText = document.getElementById('countdown-text');

    // Init Cars and Tracks
    function updateCarPosition(carElement, trackElement, step) {
      const colWidth = 100 / 12; 
      const targetPosition = (colWidth * step) + (colWidth / 2);
      carElement.style.left = `calc(${targetPosition}%)`;
      
      // Ensure tire tracks are completely hidden before moving
      if (step === 0) {
        trackElement.style.width = `0`;
      } else {
        trackElement.style.width = `calc(${targetPosition}%)`;
      }
    }
    updateCarPosition(finnCar, finnTrack, finnStep);
    updateCarPosition(bowenCar, bowenTrack, bowenStep);

    // Audio Engine
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTone(freq, type, duration, vol) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playTick() { playTone(800, 'triangle', 0.05, 0.3); }
    function playBeep() { playTone(440, 'square', 0.2, 0.2); }
    function playGoBeep() { playTone(880, 'square', 0.5, 0.3); }

    // Race Timer Updater
    function updateTimers() {
      if (!isRacing) return;
      const now = Date.now();
      const elapsed = ((now - raceStartTime) / 1000).toFixed(1);
      
      if (!finnFinished) finnTimerEl.innerText = elapsed + "s";
      if (!bowenFinished) bowenTimerEl.innerText = elapsed + "s";
    }

    // Function to drop a permanent split time marker on the track
    function recordSplit(laneElement, step, timeString) {
      const splitEl = document.createElement('div');
      splitEl.className = 'split-time';
      splitEl.innerText = timeString;
      const colWidth = 100 / 12; 
      const targetPosition = (colWidth * step) + (colWidth / 2);
      splitEl.style.left = `calc(${targetPosition}%)`;
      laneElement.appendChild(splitEl);
    }

    // Countdown Logic
    startBtn.addEventListener('click', () => {
      if (isRacing || firstPlaceAnnounced) return;
      initAudio();
      
      startBtn.style.opacity = '0.5';
      startBtn.style.pointerEvents = 'none';
      countdownOverlay.style.display = 'flex';
      
      let count = 3;
      countdownText.innerText = count;
      
      countdownText.style.animation = 'none';
      void countdownText.offsetWidth; 
      countdownText.style.animation = 'pop 1s infinite';
      
      playBeep();

      const timer = setInterval(() => {
        count--;
        if (count > 0) {
          countdownText.innerText = count;
          playBeep();
        } else if (count === 0) {
          countdownText.innerText = "GO!";
          countdownText.style.color = "#2ecc71";
          playGoBeep();
          
          // Start the Race Timers
          raceStartTime = Date.now();
          timerInterval = setInterval(updateTimers, 100);
          
        } else {
          clearInterval(timer);
          countdownOverlay.style.display = 'none';
          countdownText.style.color = "#f1c40f"; 
          isRacing = true;
        }
      }, 1000);
    });

    // Check Finish Line & Inline Celebration
    function checkFinish(name, step, carElement) {
      if (step === totalSteps) {
        
        if (name === 'Finn') finnFinished = true;
        if (name === 'Bowen') bowenFinished = true;

        if (finnFinished && bowenFinished) {
            clearInterval(timerInterval);
        }

        // Only move the car and reveal the trophy if they are the FIRST to finish
        if (!firstPlaceAnnounced) {
            firstPlaceAnnounced = true;
            
            // Apply winning classes so the trophy reveals and bounces
            carElement.classList.add('is-winner');
            
            // **FIX**: Apply class to snap car to forward facing orientation
            carElement.classList.add('finish-orientation');

            // Drive into the checkered median! **POLISH**: Center them perfectly vertically in the dirt road
            if (name === 'Finn') {
                carElement.style.top = '150%'; /* Finn drives down into median */
            } else if (name === 'Bowen') {
                carElement.style.top = '-50%'; /* Bo drives up into median */
            }
            
            confetti({ particleCount: 250, spread: 150, origin: { y: 0.4 }, zIndex: 1000 });
    
            window.speechSynthesis.cancel();
            const announcement = new SpeechSynthesisUtterance(`And the winner is... ${name}!`);
            announcement.pitch = 1.1;
            announcement.rate = 1.0;
            window.speechSynthesis.speak(announcement);
        }
        // If firstPlaceAnnounced is already true, the second place car simply stops and stays in its lane!
      }
    }

    // Lane Clicks
    finnLane.addEventListener('click', () => {
      if (isRacing && finnStep < totalSteps) {
        playTick();
        finnStep++;
        
        if (finnStep < totalSteps) {
            const splitTime = ((Date.now() - raceStartTime) / 1000).toFixed(1) + "s";
            recordSplit(finnLane, finnStep, splitTime);
        }

        updateCarPosition(finnCar, finnTrack, finnStep);
        checkFinish('Finn', finnStep, finnCar);
      }
    });

    bowenLane.addEventListener('click', () => {
      if (isRacing && bowenStep < totalSteps) {
        playTick();
        bowenStep++;
        
        if (bowenStep < totalSteps) {
            const splitTime = ((Date.now() - raceStartTime) / 1000).toFixed(1) + "s";
            recordSplit(bowenLane, bowenStep, splitTime);
        }

        updateCarPosition(bowenCar, bowenTrack, bowenStep);
        checkFinish('Bowen', bowenStep, bowenCar);
      }
    });

    // Full Reset Logic
    function resetRace() {
      finnStep = 0;
      bowenStep = 0;
      firstPlaceAnnounced = false;
      isRacing = false;
      
      clearInterval(timerInterval);
      finnFinished = false;
      bowenFinished = false;
      finnTimerEl.innerText = "0.0s";
      bowenTimerEl.innerText = "0.0s";
      
      // Clear out all the split times from the last race
      document.querySelectorAll('.split-time').forEach(el => el.remove());
      
      // Removing the class instantly hides the trophy and stops the bounce
      finnCar.classList.remove('is-winner');
      bowenCar.classList.remove('is-winner');
      
      // **FIX**: Remove finishing orientation class
      finnCar.classList.remove('finish-orientation');
      bowenCar.classList.remove('finish-orientation');

      // **POLISH**: Center both cars in their asphalt lanes vertically
      finnCar.style.top = '50%';
      bowenCar.style.top = '50%';

      updateCarPosition(finnCar, finnTrack, finnStep);
      updateCarPosition(bowenCar, bowenTrack, bowenStep);
      window.speechSynthesis.cancel();
      
      startBtn.style.opacity = '1';
      startBtn.style.pointerEvents = 'auto';
    }

    resetBtn.addEventListener('click', resetRace);

  </script>
</body>
</html>
