<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>The Rhinebeck 500</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏎️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --asphalt: #2c3e50;
      --bg-color: #ecf0f1;
      --median-bg: #5C4033; 
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none; 
      -webkit-user-select: none;
    }

    header {
      text-align: center;
      color: white;
      /* env(safe-area-inset-top) pushes the header down below the Dynamic Island */
      padding: calc(10px + env(safe-area-inset-top)) 10px 10px 10px;
      background: #000000; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex: 0 0 auto;
    }

    h1 { 
      margin: 0; 
      font-size: 3rem; 
      font-weight: 900; 
      text-transform: uppercase; 
      letter-spacing: 2px;
      color: #FFD13B; 
      text-shadow: 4px 4px 0px #E83D33; 
    }

    /* Countdown Overlay */
    #countdown-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 500;
    }
    #countdown-text {
      font-size: 15rem;
      font-weight: 900;
      color: #f1c40f;
      text-shadow: 0 10px 20px rgba(0,0,0,0.5);
      animation: pop 1s infinite;
    }
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0; }
    }

    /* DESKTOP LAYOUT (Default) */
    .scroll-wrapper {
      flex: 1; 
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    .track-container {
      flex: 1;
      display: grid;
      grid-template-rows: 1fr 15px 1fr 15px 1fr; 
      min-width: 1100px; 
      position: relative;
    }

    .lane {
      position: relative;
      background: var(--asphalt);
      display: flex;
      align-items: center;
      cursor: pointer;
      border-top: 3px solid #111;
      border-bottom: 3px solid #111;
      /* CSS Variables injected via JS */
      --car-progress: 4.16%;
      --track-progress: 0%;
    }

    .lane::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 4px;
      background: repeating-linear-gradient(90deg, #fff, #fff 40px, transparent 40px, transparent 80px);
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }

    /* Lane Elements: Pushed to extreme corners to avoid overlap with centered cars */
    .lane-label {
      position: absolute;
      left: 15px;
      color: rgba(255,255,255,0.4);
      font-weight: 700;
      font-size: 1.5rem;
      pointer-events: none;
      letter-spacing: 3px;
      z-index: 10;
    }
    #finn-lane .lane-label { top: 10px; }
    #bowen-lane .lane-label { bottom: 10px; }

    .lane-timer {
      position: absolute;
      right: 15px;
      color: #f1c40f;
      font-size: 1.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
      z-index: 10;
      pointer-events: none;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    #finn-lane .lane-timer { top: 10px; }
    #bowen-lane .lane-timer { bottom: 10px; }

    .split-time {
      position: absolute;
      left: var(--split-pos);
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      z-index: 10;
      pointer-events: none;
    }
    #finn-lane .split-time { top: 10px; }
    #bowen-lane .split-time { bottom: 10px; }

    /* Straddling Tire Tracks (Draws two distinct lines instead of one big block) */
    .tire-track {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 30px; 
      width: var(--track-progress);
      background: 
        repeating-linear-gradient(90deg, #111, #111 8px, transparent 8px, transparent 16px),
        repeating-linear-gradient(90deg, #111, #111 8px, transparent 8px, transparent 16px);
      background-size: 100% 6px, 100% 6px;
      background-position: top, bottom;
      background-repeat: no-repeat;
      z-index: 15;
      transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      opacity: 0.6;
      pointer-events: none;
    }

    .guardrail {
      background: repeating-linear-gradient(45deg, #c0392b, #c0392b 20px, #ecf0f1 20px, #ecf0f1 40px);
      box-shadow: inset 0 3px 5px rgba(0,0,0,0.5), 0 5px 10px rgba(0,0,0,0.5);
      z-index: 10;
    }

    .median {
      background: var(--median-bg);
      display: grid;
      grid-template-columns: repeat(12, 1fr); 
      align-items: center;
      color: white;
    }

    .task-box {
      text-align: center;
      padding: 5px;
      font-size: 1rem; 
      font-weight: 700;
      border-right: 2px dashed rgba(255,255,255,0.2);
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1.2;
    }
    .task-box:last-child { border-right: none; }
    
    .task-emoji {
      font-size: 2.5rem; 
      margin: 4px 0;
    }

    .start-box {
      background: #27ae60;
      color: white;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: inset -5px 0 15px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: background 0.1s;
    }
    .start-box:active { background: #1e8449; }

    .finish-box {
      background-color: #fff;
      background-image: 
        linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111),
        linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111);
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
    }

    /* CARS (Perfectly centered top:50%, line-height resets emoji baseline offset) */
    .car {
      position: absolute;
      font-size: 5.5rem; 
      line-height: 1;
      top: 50%;
      left: var(--car-progress);
      transform: translate(-50%, -50%) scaleX(-1);
      transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1), top 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      user-select: none;
      z-index: 20;
      white-space: nowrap; 
      will-change: transform; 
    }

    /* Inline flex perfectly aligns emojis */
    .bouncer {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      position: relative; 
      will-change: transform;
    }

    .vehicle {
      display: inline-block;
      filter: drop-shadow(-4px 4px 5px rgba(0,0,0,0.5));
    }
    #bowen-car .vehicle {
      filter: drop-shadow(-4px 4px 5px rgba(0,0,0,0.5)) hue-rotate(220deg);
    }

    /* Trophies & Winning Parking Positions */
    .trophy {
      display: none;
      position: absolute;
      left: 50%;
      font-size: 3.5rem;
      z-index: 30;
      transform: translateX(-50%) scaleX(-1); 
    }
    .is-winner .trophy { display: block; }
    
    #finn-lane .car.is-winner { top: calc(150% + 15px); }
    #bowen-lane .car.is-winner { top: calc(-50% - 15px); }
    
    /* Trophies both bounce ABOVE the car */
    #finn-car .trophy, #bowen-car .trophy { 
        bottom: 85%; 
        top: auto;
        animation: bounceT 0.5s infinite alternate ease-in-out; 
    }
    
    @keyframes bounceT { 0% { transform: translateX(-50%) scaleX(-1) translateY(0); } 100% { transform: translateX(-50%) scaleX(-1) translateY(-25px); } }

    .finish-orientation {
        transform: translate(-50%, -50%) scaleX(-1) !important; 
    }

    /* Grandstand Area */
    .grandstand {
      flex: 0 0 50vh;
      width: 100%;
      background-color: #34495e;
      background-image: url('grandstand.jpg'); 
      background-size: cover;
      background-position: center bottom;
      border-top: 5px solid #222;
      box-shadow: inset 0 15px 20px rgba(0,0,0,0.4);
    }

    /* Controls */
    .controls {
      position: absolute;
      bottom: 15px;
      right: 15px;
      z-index: 100;
    }
    .reset-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 8px 15px;
      font-family: 'Outfit', sans-serif;
      font-weight: bold;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      font-size: 0.9rem;
    }
    .reset-btn:hover { background: #c0392b; }

    /* MOBILE LAYOUT (Vertical) */
    @media (max-width: 1024px) {
        h1 {
            font-size: 1.8rem;
            margin: 5px 0;
            line-height: 1;
            white-space: nowrap; 
        }

        .scroll-wrapper {
            overflow-x: hidden;
            overflow-y: auto;
        }

        .track-container {
            grid-template-columns: 1fr 15px 1fr 15px 1fr;
            grid-template-rows: auto;
            min-width: 100%;
            min-height: 1200px; /* Provides vertical height for 12 tasks */
        }

        .lane {
            border-top: none; border-bottom: none;
            border-left: 3px solid #111; border-right: 3px solid #111;
        }

        .lane::after {
            width: 4px; height: 100%; top: 0; left: 50%;
            transform: translateX(-50%);
            background: repeating-linear-gradient(180deg, #fff, #fff 40px, transparent 40px, transparent 80px);
        }

        .guardrail {
            background: repeating-linear-gradient(135deg, #c0392b, #c0392b 20px, #ecf0f1 20px, #ecf0f1 40px);
        }

        .median {
            grid-template-columns: 1fr;
            grid-template-rows: repeat(12, 1fr);
        }

        .task-box {
            border-right: none;
            border-bottom: 2px dashed rgba(255,255,255,0.2);
        }
        .task-box:last-child { border-bottom: none; }

        /* Cars firmly centered at 50% X-axis, facing down organically */
        .car {
            left: 50%;
            top: var(--car-progress);
            transform: translate(-50%, -50%) rotate(-90deg);
        }

        /* Mobile tire tracks straddle perfectly */
        .tire-track {
            left: 50%;
            top: 0;
            height: var(--track-progress);
            width: 30px;
            transform: translateX(-50%);
            background: 
              repeating-linear-gradient(180deg, #111, #111 8px, transparent 8px, transparent 16px),
              repeating-linear-gradient(180deg, #111, #111 8px, transparent 8px, transparent 16px);
            background-size: 6px 100%, 6px 100%;
            background-position: left, right;
            background-repeat: no-repeat;
        }

        /* Responsive Text: Pushed to extreme left/right walls to avoid center car overlap */
        .lane-label, .lane-timer, .split-time {
            transform: none !important;
        }
        
        #finn-lane .lane-label { left: 10px; top: 15px; }
        #finn-lane .lane-timer { left: 10px; bottom: 20px; right: auto; top: auto; }
        #finn-lane .split-time { left: 10px; top: var(--split-pos); bottom: auto; transform: translateY(-50%) !important; }

        #bowen-lane .lane-label { right: 10px; top: 15px; left: auto; }
        #bowen-lane .lane-timer { right: 10px; bottom: 20px; left: auto; top: auto; }
        #bowen-lane .split-time { right: 10px; top: var(--split-pos); left: auto; bottom: auto; transform: translateY(-50%) !important; }

        /* Mobile Parking - Cars dive horizontally into median and CSS takes over */
        #finn-lane .car.is-winner { left: calc(150% + 15px); top: var(--car-progress); }
        #bowen-lane .car.is-winner { left: calc(-50% - 15px); top: var(--car-progress); }
        
        .grandstand {
            display: none !important; 
        }
    }
  </style>
</head>
<body>

  <header>
    <h1>The Rhinebeck 500</h1>
  </header>

  <div id="countdown-overlay">
    <div id="countdown-text">3</div>
  </div>

  <div class="scroll-wrapper">
    <div class="track-container">
      
      <div class="lane" id="finn-lane">
        <div class="lane-label">FINN</div>
        <div class="lane-timer" id="finn-timer">0.0s</div>
        <div class="tire-track" id="finn-track"></div>
        <div class="car" id="finn-car">
          <div class="bouncer">
            <span class="vehicle">🏎️</span><span class="trophy">🏆</span>
          </div>
        </div>
      </div>
      
      <div class="guardrail"></div>
      
      <div class="median">
        <div class="task-box start-box" id="start-btn">START<br>YOUR<br>ENGINES</div>
        <div class="task-box">1<div class="task-emoji">👕</div>Get Dressed</div>
        <div class="task-box">2<div class="task-emoji">🪮</div>Brush Hair</div>
        <div class="task-box">3<div class="task-emoji">💊</div>Meds / Vitamins</div>
        <div class="task-box">4<div class="task-emoji">🥣</div>Get Breakfast</div>
        <div class="task-box">5<div class="task-emoji">🥞</div>Eat</div>
        <div class="task-box">6<div class="task-emoji">🍽️</div>Dishes in Sink</div>
        <div class="task-box">7<div class="task-emoji">🪥</div>Brush Teeth</div>
        <div class="task-box">8<div class="task-emoji">🧴</div>Sunscreen</div>
        <div class="task-box">9<div class="task-emoji">👟</div>Shoes On</div>
        <div class="task-box">10<div class="task-emoji">🎒</div>Pack Bag</div>
        <div class="task-box finish-box"></div>
      </div>
      
      <div class="guardrail"></div>
      
      <div class="lane" id="bowen-lane">
        <div class="lane-label">BOWEN</div>
        <div class="lane-timer" id="bowen-timer">0.0s</div>
        <div class="tire-track" id="bowen-track"></div>
        <div class="car" id="bowen-car">
          <div class="bouncer">
            <span class="vehicle">🏎️</span><span class="trophy">🏆</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="grandstand"></div>

  <div class="controls">
    <button class="reset-btn" id="reset-btn">Reset Board</button>
  </div>

  <script>
    let finnStep = 0;
    let bowenStep = 0;
    const totalSteps = 11; 
    
    let firstPlaceAnnounced = false; 
    let isRacing = false;
    let audioCtx = null;
    
    let raceStartTime = 0;
    let timerInterval = null;
    let finnFinished = false;
    let bowenFinished = false;

    const finnCar = document.getElementById('finn-car');
    const bowenCar = document.getElementById('bowen-car');
    const finnLane = document.getElementById('finn-lane');
    const bowenLane = document.getElementById('bowen-lane');
    const finnTimerEl = document.getElementById('finn-timer');
    const bowenTimerEl = document.getElementById('bowen-timer');
    
    const startBtn = document.getElementById('start-btn');
    const resetBtn = document.getElementById('reset-btn');
    const countdownOverlay = document.getElementById('countdown-overlay');
    const countdownText = document.getElementById('countdown-text');

    // Advanced Responsive Layout Handler via CSS Variables
    function updateCarPosition(laneId, step) {
      const colWidth = 100 / 12; 
      const targetPosition = (colWidth * step) + (colWidth / 2);
      const laneEl = document.getElementById(laneId);
      
      laneEl.style.setProperty('--car-progress', targetPosition + '%');
      
      if (step === 0) {
        laneEl.style.setProperty('--track-progress', '0%');
      } else {
        laneEl.style.setProperty('--track-progress', targetPosition + '%');
      }
    }
    updateCarPosition('finn-lane', finnStep);
    updateCarPosition('bowen-lane', bowenStep);

    // Auto-Scroll Handler for Mobile
    function autoScrollMobile(carElement) {
       if (window.innerWidth <= 1024) {
           setTimeout(() => {
               carElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
           }, 50);
       }
    }

    // Audio Engine
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTone(freq, type, duration, vol) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playTick() { playTone(800, 'triangle', 0.05, 0.3); }
    function playBeep() { playTone(440, 'square', 0.2, 0.2); }
    function playGoBeep() { playTone(880, 'square', 0.5, 0.3); }

    // Race Timer Updater
    function updateTimers() {
      if (!isRacing) return;
      const now = Date.now();
      const elapsed = ((now - raceStartTime) / 1000).toFixed(1);
      
      if (!finnFinished) finnTimerEl.innerText = elapsed + "s";
      if (!bowenFinished) bowenTimerEl.innerText = elapsed + "s";
    }

    // Function to drop a permanent split time marker
    function recordSplit(laneId, step, timeString) {
      const laneEl = document.getElementById(laneId);
      const splitEl = document.createElement('div');
      splitEl.className = 'split-time';
      splitEl.innerText = timeString;
      
      const colWidth = 100 / 12; 
      const targetPosition = (colWidth * step) + (colWidth / 2);
      
      // Injected CSS variable anchors it appropriately on Desktop or Mobile
      splitEl.style.setProperty('--split-pos', targetPosition + '%');
      laneEl.appendChild(splitEl);
    }

    // Countdown Logic
    startBtn.addEventListener('click', () => {
      if (isRacing || firstPlaceAnnounced) return;
      initAudio();
      
      startBtn.style.opacity = '0.5';
      startBtn.style.pointerEvents = 'none';
      countdownOverlay.style.display = 'flex';
      
      let count = 3;
      countdownText.innerText = count;
      
      countdownText.style.animation = 'none';
      void countdownText.offsetWidth; 
      countdownText.style.animation = 'pop 1s infinite';
      
      playBeep();

      const timer = setInterval(() => {
        count--;
        if (count > 0) {
          countdownText.innerText = count;
          playBeep();
        } else if (count === 0) {
          countdownText.innerText = "GO!";
          countdownText.style.color = "#2ecc71";
          playGoBeep();
          
          raceStartTime = Date.now();
          timerInterval = setInterval(updateTimers, 100);
        } else {
          clearInterval(timer);
          countdownOverlay.style.display = 'none';
          countdownText.style.color = "#f1c40f"; 
          isRacing = true;
        }
      }, 1000);
    });

    // Check Finish Line & Inline Celebration
    function checkFinish(name, step, carElement) {
      if (step === totalSteps) {
        
        if (name === 'Finn') finnFinished = true;
        if (name === 'Bowen') bowenFinished = true;

        if (finnFinished && bowenFinished) {
            clearInterval(timerInterval);
        }

        // Only move the car and reveal the trophy if they are the FIRST to finish
        if (!firstPlaceAnnounced) {
            firstPlaceAnnounced = true;
            
            // Appends the CSS state that handles the winner parking and default orientation entirely via CSS
            carElement.classList.add('is-winner');
            carElement.classList.add('finish-orientation');
            
            confetti({ particleCount: 250, spread: 150, origin: { y: 0.4 }, zIndex: 1000 });
            window.speechSynthesis.cancel();
            
            const announcement = new SpeechSynthesisUtterance(`And the winner is... ${name}!`);
            announcement.pitch = 1.1;
            announcement.rate = 1.0;
            window.speechSynthesis.speak(announcement);
        }
      }
    }

    // Lane Clicks
    finnLane.addEventListener('click', () => {
      if (isRacing && finnStep < totalSteps) {
        playTick();
        finnStep++;
        
        if (finnStep < totalSteps) {
            const splitTime = ((Date.now() - raceStartTime) / 1000).toFixed(1) + "s";
            recordSplit('finn-lane', finnStep, splitTime);
        }

        updateCarPosition('finn-lane', finnStep);
        checkFinish('Finn', finnStep, finnCar);
        autoScrollMobile(finnCar);
      }
    });

    bowenLane.addEventListener('click', () => {
      if (isRacing && bowenStep < totalSteps) {
        playTick();
        bowenStep++;
        
        if (bowenStep < totalSteps) {
            const splitTime = ((Date.now() - raceStartTime) / 1000).toFixed(1) + "s";
            recordSplit('bowen-lane', bowenStep, splitTime);
        }

        updateCarPosition('bowen-lane', bowenStep);
        checkFinish('Bowen', bowenStep, bowenCar);
        autoScrollMobile(bowenCar);
      }
    });

    // Full Reset Logic
    function resetRace() {
      finnStep = 0;
      bowenStep = 0;
      firstPlaceAnnounced = false;
      isRacing = false;
      
      clearInterval(timerInterval);
      finnFinished = false;
      bowenFinished = false;
      finnTimerEl.innerText = "0.0s";
      bowenTimerEl.innerText = "0.0s";
      
      document.querySelectorAll('.split-time').forEach(el => el.remove());
      
      finnCar.classList.remove('is-winner');
      bowenCar.classList.remove('is-winner');
      finnCar.classList.remove('finish-orientation');
      bowenCar.classList.remove('finish-orientation');

      updateCarPosition('finn-lane', finnStep);
      updateCarPosition('bowen-lane', bowenStep);
      window.speechSynthesis.cancel();
      
      startBtn.style.opacity = '1';
      startBtn.style.pointerEvents = 'auto';
    }

    resetBtn.addEventListener('click', resetRace);

  </script>
</body>
</html>
